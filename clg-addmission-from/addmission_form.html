<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission Form</title>
</head>

<body>
  <h1>Admission Form</h1>
  <div>
    <label for="Name">Full Name Of Applicant</label>
    <input id="Name" type="text" placeholder="First">
    <input id="Name" type="text" placeholder="Middle">
    <input id="Name" type="text" placeholder="Last">
  </div>
  <div>
    <label for="d.o.b">D.O.B</label>
    <input id="d.o.b" type="date">
  </div>
  <div>
    <label for="contact">Contact</label>
    <input id="contact" type="number" placeholder="Enter Your Mobile Number">
  </div>
  <div>
    <label for="marksheet">S.S.C Marksheet</label>
    <input id="marksheet" type="number" placeholder="S.S.C Marks">
  </div>
  <div>
    <label for="percentage">S.S.C Percentage</label>
    <input id="percentage" type="number" placeholder="S.S.C Percentage">
  </div>
  <div>
    <label for="address">Permanent Address</label>
    <input id="address" type="text" placeholder="Street Address">
    <input id="address" type="text" placeholder="City">
    <input id="address" type="text" placeholder="state">
  </div>
  <label for="nationality">Nationality</label>
  <select id="nationality">Nationality
    <option value="" disabled selected>Nationality</option>
    <option value="India">India</option>
    <option value="brazil">Brazil</option>
    <option value="america">America</option>
    <option value="china">China</option>
    <option value="japan">Japan</option>
  </select>
  <div>
    <h3>choose stream</h3>
    <label for="stream">Stream</label>
    <select id="stream" required>
      <option value="" disabled selected>stream</option>
      <option value="science">Science</option>
      <option value="commerce">Commerce</option>
      <option value="arts">Arts</option>
    </select>
  </div>
  <div>
    <h3>select category</h3>
    <input id="Open" type="radio" name="select category" value="Open">
    <label for="Open">Open</label>
    <input id="O.B.C" type="radio" name="select category" value="O.B.C">
    <label for="O.B.C">O.B.C</label>
    <div>
      <h3>Select Subjects</h3>
      <input id="eng" type="checkbox" required>
      <label for="eng">English</label>
      <input id="physics" type="checkbox" required>
      <label for="physics">Physics</label>
      <input id="bio" type="checkbox" required>
      <label for="bio">Biology</label>
      <input id="chem" type="checkbox" required>
      <label for="chem">Chemistry</label>
      <input id="hindi" type="checkbox" >
      <label for="hindi">Hindi</label>
      <input id="urdu" type="checkbox" >
      <label for="urdu">Urdu</label>
      <input id="it" type="checkbox" >
      <label for="it">I.T</label>
      <input id="geog" type="checkbox" >
      <label for="geog">Geography</label>
      <input id="maths" type="checkbox">
      <label for="maths">Maths</label>
    <hr>
    <label for="parents">Guardians/Parents' Name</label>
    <input id="parents" type="text" placeholder="First">
    <input id="parents" type="text" placeholder="Middle">
    <input id="parents" type="text" placeholder="Last">
  </div>
  <div>
    <label for="parent">Guardians/Parents' contact</label>
    <input id="parent" type="number" placeholder="Contact">
  </div>
  <button>submit form</button>
  <h
  <h3>Fee Structure</h3>
  <table>
    <thead>
      <tr>
        <th>course</th>
        <th>1st Year</th>
        <th>2nd Year</th>
        <th>3rd Year</th>
      </tr>
      <tr>
        <td>BCA</td>
        <td>22750/-</td>
        <td>26500/-</td>
        <td>21000/-</td>
      </tr>
      <tr>
        <td>BBA</td>
        <td>19000</td>
        <td>25700</td>
        <td>16000</td>
      </tr>
      <tr>
        <td>B.Sc</td>
        <td>27000</td>
        <td>31500</td>
        <td>23000</td>
      </tr>
    </thead>
  </table>
</body>

</html>

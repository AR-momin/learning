<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
</head>

<body>
  <h1>Job Application Form</h1>
  <form action="">

    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter Your Name" required>
    <br>

    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="Enter Your E-mail" required>
    <br>

    <label for="phone">Contact</label>
    <input type="tel" id="phone" placeholder="Enter Your Phone Num" required><br>
    <hr>

    <h2>Job Profile</h2>
    <input type="radio" id="Backend" name="profile" value="Back-end">
    <label for="Backend">Backend</label>

    <input type="radio" id="frontend" name="profile" value="frontend">
    <label for="frontend">Frontend</label>

    <input type="radio" id="fullstack" name="profile" value="fullackst">
    <label for="fullstack">Full-Stack</label>

    <input type="radio" id="AI/ML" name="profile" value="AI/ML">
    <label for="AI/ML">AI/ML Engineer</label>
    <hr>

    <h2>Skills</h2>
    <input type="checkbox" id="HTML" name="HTML" value="HTML">
    <label for="HTML">HTML</label>
    <input type="checkbox" id="CSS" name="CSS" value="CSS">
    <label for="CSS">CSS</label>
    <input type="checkbox" id="JS" name="JS" value="JS">
    <label for="JS">JS</label>
    <input type="checkbox" id="React" name="React" value="React">
    <label for="React">React.js</label>
    <input type="checkbox" id="node" name="node" value="node">
    <label for="node">node.js</label>
    <input type="checkbox" id="MongoDB" name="MongoDB" value="MongoDB">
    <label for="MongoDB">MongoDB</label>
    <input type="checkbox" id="Git" name="Git" value="Git">
    <label for="Git">Git</label>
    <input type="checkbox" id=".Net" name=".Net" value=".Net">
    <label for=".Net">.Net</label>
    <input type="checkbox" id="database" name="database" value="database">
    <label for="database">DataBase</label>
    <hr>
    <h2>Highest Qualification</h2>
    <label for="Qualification">Qualification</label>
    <select id="Qualification" required>Qualification
      <option value="" disabled selected>Qualification</option>
      <option value="BCA 1st year">BCA 1st Year</option>
      <option value="BCA 2nd year">BCA 2nd Year</option>
      <option value="BCA 3rd year">BCA 3rd Year</option>
      <option value="diploma">Diploma</option>
    </select>
    <hr>
    <div>
      <h2>Resume and About You</h2>
      <label for="url">Resume</label>
      <input type="url" id="url" placeholder="Paste Your Resume URL" required>
    </div>
    <div>
      <label for="You">About You & Your Feedback</label>
      <textarea id="You" rows="3">Comment</textarea>
    </div>
    <hr>
    <button type="submit">Submit</button>
  </form>
</body>

</html>
